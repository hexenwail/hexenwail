app-id: com.github.bobberb.hexenwail
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
command: hexenwail.sh

finish-args:
  # GPU (OpenGL 4.3)
  - --device=dri
  # Display (Wayland preferred, X11 fallback)
  - --socket=wayland
  - --socket=fallback-x11
  - --share=ipc
  # Gamepads/joysticks
  - --device=input
  # Audio (PulseAudio/PipeWire)
  - --socket=pulseaudio
  # Network (LAN multiplayer)
  - --share=network
  # Game data — user places pak files here
  - --persist=.hexen2

cleanup:
  - /include
  - /lib/pkgconfig
  - /share/doc
  - /share/man
  - '*.a'
  - '*.la'

modules:
  # SDL3 is bundled in org.freedesktop.Platform 25.08 — no module needed

  - name: fluidsynth
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      - -DLIB_SUFFIX=
      - -Denable-libsndfile=off
      - -Denable-dbus=off
      - -Denable-systemd=off
    sources:
      - type: git
        url: https://github.com/FluidSynth/fluidsynth.git
        tag: v2.4.6
        disable-submodules: true

  - name: libogg
    buildsystem: autotools
    sources:
      - type: archive
        url: https://downloads.xiph.org/releases/ogg/libogg-1.3.5.tar.xz
        sha256: c4d91be36fc8e54deae7575241e03f4211eb102afb3fc0775fbbc1b740016705

  - name: libvorbis
    buildsystem: autotools
    sources:
      - type: archive
        url: https://downloads.xiph.org/releases/vorbis/libvorbis-1.3.7.tar.xz
        sha256: b33cc4934322bcbf6efcbacf49e3ca01aadbea4114ec9589d1b1e9d20f72954b

  - name: libopus
    buildsystem: autotools
    sources:
      - type: archive
        url: https://downloads.xiph.org/releases/opus/opus-1.5.2.tar.gz
        sha256: 65c1d2f78b9f2fb20082c38cbe47c951ad5839345876e46941612ee87f9a7ce1

  - name: opusfile
    buildsystem: autotools
    sources:
      - type: archive
        url: https://downloads.xiph.org/releases/opus/opusfile-0.12.tar.gz
        sha256: 118d8601c12dd6a44f52423e68ca9083cc9f2bfe72da7a8c1acb22a80ae3550b

  - name: libxmp
    buildsystem: autotools
    sources:
      - type: git
        url: https://github.com/libxmp/libxmp.git
        tag: libxmp-4.6.3
        commit: bed660f8e530d399c38f27a5a7732f4e79740585

  - name: hexenwail
    buildsystem: cmake-ninja
    subdir: engine
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      - -DUSE_CODEC_VORBIS=ON
      - -DUSE_CODEC_OPUS=ON
      - -DUSE_CODEC_XMP=ON
      - -DUSE_ALSA=OFF
    sources:
      - type: dir
        path: ..
    post-install:
      - install -Dm755 ../flatpak/hexenwail.sh /app/bin/hexenwail.sh
      - install -Dm644 ../flatpak/com.github.bobberb.hexenwail.desktop /app/share/applications/com.github.bobberb.hexenwail.desktop
      - install -Dm644 ../flatpak/com.github.bobberb.hexenwail.metainfo.xml /app/share/metainfo/com.github.bobberb.hexenwail.metainfo.xml
      - install -Dm644 ../engine/resource/hexen2.png /app/share/icons/hicolor/128x128/apps/com.github.bobberb.hexenwail.png
