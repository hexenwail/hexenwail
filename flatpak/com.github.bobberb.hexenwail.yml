app-id: com.github.bobberb.hexenwail
runtime: org.freedesktop.Platform
runtime-version: '24.08'
sdk: org.freedesktop.Sdk
command: glhexen2

finish-args:
  # GPU (OpenGL 4.3)
  - --device=dri
  # Display
  - --socket=wayland
  - --socket=fallback-x11
  - --share=ipc
  # Gamepads/joysticks
  - --device=input
  # Audio (PulseAudio/PipeWire)
  - --socket=pulseaudio
  # Network (LAN multiplayer)
  - --share=network
  # Game data — user places pak files here
  - --persist=.hexen2

cleanup:
  - /include
  - /lib/pkgconfig
  - /share/doc
  - /share/man
  - '*.a'
  - '*.la'

modules:
  - name: sdl3
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      - -DSDL_TESTS=OFF
      - -DSDL_EXAMPLES=OFF
    sources:
      - type: git
        url: https://github.com/libsdl-org/SDL.git
        tag: release-3.2.14
        commit: 8d604353a53853fa56d1bdce0363535605ca868f
    cleanup:
      - /bin/sdl3-config
      - /share/aclocal

  - name: fluidsynth
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      - -DLIB_SUFFIX=
      - -Denable-libsndfile=off
      - -Denable-dbus=off
      - -Denable-systemd=off
    sources:
      - type: git
        url: https://github.com/FluidSynth/fluidsynth.git
        tag: v2.4.6
        disable-submodules: true

  # Soundfont for MIDI music — user can also place soundfont.sf2 in game dir
  # FluidR3_GM is ~148MB; skip if size is a concern (MIDI still works if
  # user provides their own soundfont via snd_soundfont cvar)
  #- name: soundfont
  #  buildsystem: simple
  #  build-commands:
  #    - install -Dm644 FluidR3_GM2-2.sf3 /app/share/soundfonts/default.sf2
  #  sources:
  #    - type: file
  #      url: https://github.com/musescore/MuseScore/raw/master/share/sound/FluidR3Mono_GM.sf3
  #      sha256: <compute after download>

  - name: libogg
    buildsystem: autotools
    sources:
      - type: archive
        url: https://downloads.xiph.org/releases/ogg/libogg-1.3.5.tar.xz
        sha256: c4d91be36fc8e54deae7575241e03f4211eb102afb3fc0775fbbc1b740016705

  - name: libvorbis
    buildsystem: autotools
    sources:
      - type: archive
        url: https://downloads.xiph.org/releases/vorbis/libvorbis-1.3.7.tar.xz
        sha256: b33cc4934322bcbf6efcbacf49e3ca01aadbea4114ec9589d1b1e9d20f72954b

  - name: hexenwail
    buildsystem: cmake-ninja
    subdir: engine
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      - -DUSE_CODEC_VORBIS=ON
      - -DUSE_ALSA=OFF
    sources:
      - type: dir
        path: ..
    post-install:
      - install -Dm644 ../flatpak/com.github.bobberb.hexenwail.desktop /app/share/applications/com.github.bobberb.hexenwail.desktop
      - install -Dm644 ../flatpak/com.github.bobberb.hexenwail.metainfo.xml /app/share/metainfo/com.github.bobberb.hexenwail.metainfo.xml
      - install -Dm644 ../engine/resource/hexen2.png /app/share/icons/hicolor/128x128/apps/com.github.bobberb.hexenwail.png
