name: CI

on:
  push:
    branches: [master]
    tags-ignore:
      - '**'
  pull_request:
    branches: [master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Shellcheck
        run: shellcheck scripts/mkrelease.sh flatpak/hexenwail.sh

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            accept-flake-config = true
      - uses: cachix/cachix-action@v17
        # Cachix outages (e.g. 502 from cachix.org) shouldn't fail the build —
        # we just lose the cache for that run.
        continue-on-error: true
        with:
          name: hexenwail
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - name: Build Linux
        run: nix build .#nixos --print-build-logs

      - name: Smoke test
        run: SDL_VIDEODRIVER=offscreen SDL_AUDIODRIVER=dummy timeout 10 nix run .#nixos -- -help 2>&1 | head -20 || true

      - name: Build Windows
        run: nix build .#win64 --print-build-logs

  flatpak:
    runs-on: ubuntu-latest
    # flatpak + flatpak-builder are installed directly on the runner — the
    # bilelmoussaoui/flatpak-github-actions container image worked until
    # Docker Hub flaked (release run 27069188929, 2026-06-06) and tanked
    # the whole release because the container couldn't be pulled.  Ubuntu
    # 24.04 ships flatpak-builder in main, so no PPA is needed.  The 25.08
    # runtime/SDK is still pulled from Flathub either way.
    steps:
      - uses: actions/checkout@v6
      - name: Install flatpak-builder
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder
          # The container image came with Flathub pre-configured and ran as
          # root; a bare apt install on the runner has neither.  Add the
          # system remote, then pre-install the runtime + SDK as root (root
          # bypasses polkit, which the unprivileged runner user lacks for
          # system flatpak operations).  Without this the action's own
          # `flatpak --system install` fails with "operation Deploy not
          # allowed for user"; once the deps are present that install is a
          # no-op.
          sudo flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          sudo flatpak install -y --noninteractive flathub \
            org.freedesktop.Platform//25.08 org.freedesktop.Sdk//25.08
      - uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: hexenwail.flatpak
          manifest-path: flatpak/io.github.hexenwail.hexenwail.yml
          cache-key: flatpak-builder-${{ github.sha }}
