name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/install-nix-action@v31
      - uses: cachix/cachix-action@v17
        with:
          name: hexenwail
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - name: Build Linux
        run: nix build .#nixos --print-build-logs

      - name: Build Windows
        run: nix build .#win64 --print-build-logs

  flatpak:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Flatpak tools
        run: |
          sudo add-apt-repository -y ppa:flatpak/stable
          sudo apt-get update -q
          sudo apt-get install -y flatpak flatpak-builder
          flatpak remote-add --user --if-not-exists flathub \
            https://flathub.org/repo/flathub.flatpakrepo

      - name: Cache Flatpak runtime and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.local/share/flatpak
            .flatpak-builder/downloads
            .flatpak-builder/git
          key: flatpak-25.08-${{ runner.os }}-${{ hashFiles('flatpak/com.github.bobberb.hexenwail.yml') }}
          restore-keys: |
            flatpak-25.08-${{ runner.os }}-

      - name: Install SDK and runtime
        run: |
          flatpak install --user -y flathub \
            org.freedesktop.Platform//25.08 \
            org.freedesktop.Sdk//25.08

      - name: Build Flatpak
        run: |
          flatpak-builder --user --force-clean --disable-rofiles-fuse \
            build-dir flatpak/com.github.bobberb.hexenwail.yml
