name: CI

on:
  push:
    branches: [master]
    tags-ignore:
      - '**'
  pull_request:
    branches: [master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Shellcheck
        run: shellcheck scripts/mkrelease.sh flatpak/hexenwail.sh

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/install-nix-action@v31
      - uses: cachix/cachix-action@v17
        # Cachix outages (e.g. 502 from cachix.org) shouldn't fail the build —
        # we just lose the cache for that run.
        continue-on-error: true
        with:
          name: hexenwail
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - name: Build Linux
        run: nix build .#nixos --print-build-logs

      - name: Smoke test
        run: SDL_VIDEODRIVER=offscreen SDL_AUDIODRIVER=dummy timeout 10 nix run .#nixos -- -help 2>&1 | head -20 || true

      - name: Build Windows
        run: nix build .#win64 --print-build-logs

  flatpak:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Flatpak tools
        run: |
          # Retry — Canonical's PPA (ppa.launchpadcontent.net) serves
          # transient 503s and connection-refused errors that have
          # outlasted shorter retry windows.  5×60s = ~5min total.
          for i in 1 2 3 4 5; do
            sudo add-apt-repository -y ppa:flatpak/stable && \
            sudo apt-get update -q && \
            sudo apt-get install -y flatpak flatpak-builder && break
            echo "apt attempt $i failed, retrying in 60s..."
            sleep 60
          done
          flatpak remote-add --user --if-not-exists flathub \
            https://flathub.org/repo/flathub.flatpakrepo

      - name: Cache Flatpak runtime and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.local/share/flatpak
            .flatpak-builder/downloads
            .flatpak-builder/git
          key: flatpak-25.08-${{ runner.os }}-${{ hashFiles('flatpak/com.github.bobberb.hexenwail.yml') }}
          restore-keys: |
            flatpak-25.08-${{ runner.os }}-

      - name: Install SDK and runtime
        run: |
          flatpak install --user -y flathub \
            org.freedesktop.Platform//25.08 \
            org.freedesktop.Sdk//25.08

      - name: Build Flatpak
        run: |
          flatpak-builder --user --force-clean --disable-rofiles-fuse \
            build-dir flatpak/com.github.bobberb.hexenwail.yml
