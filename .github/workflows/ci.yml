name: CI

on:
  push:
    branches: [master]
    tags-ignore:
      - '**'
  pull_request:
    branches: [master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Shellcheck
        run: shellcheck scripts/mkrelease.sh flatpak/hexenwail.sh

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/install-nix-action@v31
      - uses: cachix/cachix-action@v17
        # Cachix outages (e.g. 502 from cachix.org) shouldn't fail the build —
        # we just lose the cache for that run.
        continue-on-error: true
        with:
          name: hexenwail
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - name: Build Linux
        run: nix build .#nixos --print-build-logs

      - name: Smoke test
        run: SDL_VIDEODRIVER=offscreen SDL_AUDIODRIVER=dummy timeout 10 nix run .#nixos -- -help 2>&1 | head -20 || true

      - name: Build Windows
        run: nix build .#win64 --print-build-logs

  flatpak:
    runs-on: ubuntu-latest
    # Run inside the Flathub-blessed image — flatpak / flatpak-builder /
    # SDK already preloaded.  Bypasses the flaky Canonical PPA path.
    container:
      # Image tagged after the SDK preloaded inside it.  freedesktop-24.08
      # is the newest available; our manifest uses 25.08 which is pulled
      # from Flathub on first build and cached by the action thereafter.
      image: bilelmoussaoui/flatpak-github-actions:freedesktop-24.08
      options: --privileged
    steps:
      - uses: actions/checkout@v6
      - uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: hexenwail.flatpak
          manifest-path: flatpak/com.github.bobberb.hexenwail.yml
          cache-key: flatpak-builder-${{ github.sha }}
