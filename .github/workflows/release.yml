name: Release

on:
  push:
    tags:
      - '[0-9][0-9].[0-9][0-9]-*'
      - '[0-9]*.[0-9]*.[0-9]*-*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  flatpak:
    runs-on: ubuntu-latest
    # flatpak-builder installed directly on the runner — see ci.yml for rationale.
    steps:
      - uses: actions/checkout@v6
      - name: Install flatpak-builder
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder
          # The container image came with Flathub pre-configured and ran as
          # root; a bare apt install on the runner has neither.  Add the
          # system remote, then pre-install the runtime + SDK as root (root
          # bypasses polkit, which the unprivileged runner user lacks for
          # system flatpak operations).  Without this the action's own
          # `flatpak --system install` fails with "operation Deploy not
          # allowed for user"; once the deps are present that install is a
          # no-op.
          sudo flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          sudo flatpak install -y --noninteractive flathub \
            org.freedesktop.Platform//25.08 org.freedesktop.Sdk//25.08
      - uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: hexenwail-${{ github.ref_name }}.flatpak
          manifest-path: flatpak/io.github.hexenwail.hexenwail.yml
          cache-key: flatpak-builder-${{ github.sha }}
          upload-artifact: true

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            accept-flake-config = true
      - uses: cachix/cachix-action@v17
        # Cachix outages shouldn't fail the build — we just lose the cache.
        continue-on-error: true
        with:
          name: hexenwail
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - name: Build release binaries
        run: nix build .#release --print-build-logs

      - name: Package
        run: |
          cp -rL result/release staging

          # Linux: keep the linux-x86_64/ tree as-is.
          (cd staging && zip -r ../hexenwail-${{ github.ref_name }}-linux-x86_64.zip \
            linux-x86_64/ licenses/ BUILD_INFO.txt)

          # Windows: Hexen II-style flat layout — glh2.exe + DLLs at the zip
          # root next to an empty data1/, so users extract straight into their
          # Hexen II directory and drop pak0.pak/pak1.pak into data1/.
          winpkg=hexenwail-windows
          mkdir -p "$winpkg/data1"
          cp staging/windows-x86_64/bin/* "$winpkg/"
          cp -r staging/licenses "$winpkg/"
          cp staging/BUILD_INFO.txt "$winpkg/"
          echo "Place your Hexen II pak files (pak0.pak, pak1.pak) in this folder." \
            > "$winpkg/data1/README - put pak files here.txt"
          (cd "$winpkg" && zip -r ../hexenwail-${{ github.ref_name }}-windows-x86_64.zip .)

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-bundle
          path: hexenwail-${{ github.ref_name }}-linux-x86_64.zip

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-bundle
          path: hexenwail-${{ github.ref_name }}-windows-x86_64.zip

      - name: Generate changelog
        run: |
          # Pick the most recently CREATED tag, not the lex-highest version
          # name.  Three legacy tag schemes linger in this repo (uhexen2-*,
          # 26.03-*, v0.7.1-alpha.r3) and lex-sort above the current
          # 0.7.x-beta.rN scheme, so version:refname kept comparing every
          # release against v0.7.1-alpha.r3.
          PREV_TAG=$(git tag --sort=-creatordate | grep -v "^${{ github.ref_name }}$" | head -1 || echo "")
          if [ -n "$PREV_TAG" ]; then
            RANGE="${PREV_TAG}..HEAD"
            HEADER="## What's changed since $PREV_TAG"
          else
            RANGE="HEAD"
            HEADER="## Initial release"
          fi
          {
            echo "$HEADER"
            echo ""
            echo "### Commits"
            echo ""
            git log "$RANGE" --no-merges --format="- %s (\`%h\`)" | grep -v "Sync beads" || true
            echo ""
            echo "## Downloads"
            echo ""
            echo "- **Linux x86_64** — extract and run \`glhexen2\` from your Hexen II data directory"
            echo "- **Linux Flatpak** — \`flatpak install hexenwail-*.flatpak\`, then place game data in \`~/.var/app/io.github.hexenwail.hexenwail/.hexen2/data1/\`"
            echo "- **Windows x86_64** — extract anywhere, drop \`pak0.pak\`/\`pak1.pak\` into the included \`data1/\` folder, run \`glh2.exe\`"
            echo ""
            echo "Requires game data files (\`data1/pak0.pak\`, \`data1/pak1.pak\`)."
            echo ""
            echo "**Requirements:** OpenGL 4.3 capable GPU (2012+)"
          } > release_notes.md

      - name: Upload release notes
        uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: release_notes.md

  publish:
    runs-on: ubuntu-latest
    needs: [flatpak, build]
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.ref_name }} \
            --repo ${{ github.repository }} \
            --prerelease \
            --title "${{ github.ref_name }}" \
            --notes-file release-notes/release_notes.md \
            linux-bundle/hexenwail-${{ github.ref_name }}-linux-x86_64.zip \
            windows-bundle/hexenwail-${{ github.ref_name }}-windows-x86_64.zip \
            hexenwail-${{ github.ref_name }}-x86_64.flatpak/hexenwail-${{ github.ref_name }}.flatpak
