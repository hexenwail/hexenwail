name: Release

on:
  push:
    tags:
      - '[0-9][0-9].[0-9][0-9]-*'
      - '[0-9]*.[0-9]*.[0-9]*-*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  flatpak:
    runs-on: ubuntu-latest
    # Run inside the Flathub-blessed image — see ci.yml for rationale.
    container:
      image: bilelmoussaoui/flatpak-github-actions:freedesktop-24.08
      options: --privileged
    steps:
      - uses: actions/checkout@v6
      - uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: hexenwail-${{ github.ref_name }}.flatpak
          manifest-path: flatpak/com.github.bobberb.hexenwail.yml
          cache-key: flatpak-builder-${{ github.sha }}
          upload-artifact: true

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: cachix/install-nix-action@v31
      - uses: cachix/cachix-action@v17
        # Cachix outages shouldn't fail the build — we just lose the cache.
        continue-on-error: true
        with:
          name: hexenwail
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - name: Build release binaries
        run: nix build .#release --print-build-logs

      - name: Package
        run: |
          cp -rL result/release staging
          cd staging
          zip -r ../hexenwail-${{ github.ref_name }}-linux-x86_64.zip \
            linux-x86_64/ licenses/ BUILD_INFO.txt
          zip -r ../hexenwail-${{ github.ref_name }}-windows-x86_64.zip \
            windows-x86_64/ licenses/ BUILD_INFO.txt

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-bundle
          path: hexenwail-${{ github.ref_name }}-linux-x86_64.zip

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-bundle
          path: hexenwail-${{ github.ref_name }}-windows-x86_64.zip

      - name: Generate changelog
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | grep -v "^${{ github.ref_name }}$" | head -1 || echo "")
          if [ -n "$PREV_TAG" ]; then
            RANGE="${PREV_TAG}..HEAD"
            HEADER="## What's changed since $PREV_TAG"
          else
            RANGE="HEAD"
            HEADER="## Initial release"
          fi
          {
            echo "$HEADER"
            echo ""
            echo "### Commits"
            echo ""
            git log "$RANGE" --no-merges --format="- %s (\`%h\`)" | grep -v "Sync beads" || true
            echo ""
            echo "## Downloads"
            echo ""
            echo "- **Linux x86_64** — extract and run \`glhexen2\` from your Hexen II data directory"
            echo "- **Linux Flatpak** — \`flatpak install hexenwail-*.flatpak\`, then place game data in \`~/.var/app/com.github.bobberb.hexenwail/.hexen2/data1/\`"
            echo "- **Windows x86_64** — extract all files to your Hexen II directory, run \`glh2.exe\`"
            echo ""
            echo "Requires game data files (\`data1/pak0.pak\`, \`data1/pak1.pak\`)."
            echo ""
            echo "**Requirements:** OpenGL 4.3 capable GPU (2012+)"
          } > release_notes.md

      - name: Upload release notes
        uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: release_notes.md

  publish:
    runs-on: ubuntu-latest
    needs: [flatpak, build]
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.ref_name }} \
            --repo ${{ github.repository }} \
            --prerelease \
            --title "${{ github.ref_name }}" \
            --notes-file release-notes/release_notes.md \
            linux-bundle/hexenwail-${{ github.ref_name }}-linux-x86_64.zip \
            windows-bundle/hexenwail-${{ github.ref_name }}-windows-x86_64.zip \
            hexenwail-${{ github.ref_name }}-x86_64.flatpak/hexenwail-${{ github.ref_name }}.flatpak
