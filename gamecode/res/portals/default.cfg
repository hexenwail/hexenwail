//
// Hexenwail default bindings (Portals)
//

//
// movement (WASD + mouselook)
//
bind	w		+forward
bind	s		+back
bind	a		+moveleft
bind	d		+moveright
bind	SPACE		+jump
bind	CTRL		+crouch
bind	SHIFT		+speed

//
// combat & interaction
//
bind	MOUSE1		+attack
bind	MOUSE2		+jump
bind	MWHEELUP	"impulse 10"	// next weapon
bind	MWHEELDOWN	"impulse 12"	// prev weapon
bind	e		"invuse"
bind	q		"invleft"
bind	r		"invright"
bind	g		"impulse 44"	// drop item
bind	f		"impulse 13"	// lift object
bind	o		+infoplaque

//
// weapon select
//
bind	1		"impulse 1"
bind	2		"impulse 2"
bind	3		"impulse 3"
bind	4		"impulse 4"
bind	5		"impulse 5"
bind	6		"impulse 6"
bind	7		"impulse 7"
bind	8		"impulse 8"
bind	0		"impulse 0"

//
// info & chat
//
bind	TAB		+showinfo
bind	t		"messagemode"

//
// zoom
//
alias zoom_in "sensitivity_save save;sensitivity 2;fov 90;wait;fov 70;wait;fov 50;wait;fov 30;wait;fov 10;wait;fov 5;bind MOUSE2 zoom_out;bind F11 zoom_out"
alias zoom_out "sensitivity 4;fov 5;wait;fov 10;wait;fov 30;wait;fov 50;wait;fov 70;wait;fov 90;bind MOUSE2 +jump;bind F11 zoom_in; sensitivity_save restore"

//
// function keys
//
bind	F1		"help"
bind	F2		"menu_save"
bind	F3		"menu_load"
bind	F4		"menu_options"
bind	F5		"echo Quicksaving...; wait; save quick"
bind	F6		"echo Quickloading...; wait; load quick"
bind	F9		"echo Quickloading...; wait; load quick"
bind	F10		"quit"
bind	F11		"zoom_in"
bind	F12		"screenshot"

//
// system
//
bind	PAUSE		"pause"
bind	ESCAPE		"togglemenu"
bind	~		"toggleconsole"
bind	`		"toggleconsole"

//
// gamepad
//
bind	GP_RTRIGGER	+attack
bind	GP_LTRIGGER	+jump
bind	GP_RSHOULDER	"impulse 10"	// next weapon
bind	GP_LSHOULDER	"impulse 12"	// prev weapon
bind	GP_A		+jump
bind	GP_B		"impulse 13"	// lift object
bind	GP_X		"impulse 23"	// use artifact
bind	GP_Y		"impulse 10"	// next weapon
bind	GP_LTHUMB	+crouch
bind	GP_RTHUMB	+speed
bind	GP_START	"togglemenu"
bind	GP_BACK		+showinfo

//
// default cvars
//
viewsize	110
sbtrans		0
gamma		0.75
volume		0.7
bgmvolume	0.7
sensitivity	3
_enable_mouse	1
+mlook
